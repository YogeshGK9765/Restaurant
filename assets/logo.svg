<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Circular background -->
  <circle cx="100" cy="100" r="96" fill="#0e0a06" stroke="#c9933a" stroke-width="2"/>

  <!-- Stylized "S" / flame / spice swirl -->
  <path d="M100 40 C130 40 152 60 152 82 C152 104 128 112 108 118 C88 124 68 132 68 156 C68 174 84 186 100 186"
        stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M100 40 C70 40 52 58 52 78 C52 96 70 106 90 112"
