  <defs>
    <linearGradient id="goldGrad" x1="60" y1="40" x2="160" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c9933a"/>
      <stop offset="50%" stop-color="#f0c060"/>
      <stop offset="100%" stop-color="#c9933a"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="52" y1="40" x2="100" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="100%" stop-color="#c9933a"/>
    </linearGradient>
  </defs>
</svg>
