  <!-- Spice dots -->
  <circle cx="148" cy="70" r="5" fill="#f0c060" opacity="0.8"/>
  <circle cx="158" cy="84" r="3.5" fill="#f0c060" opacity="0.6"/>
  <circle cx="162" cy="98" r="2.5" fill="#f0c060" opacity="0.4"/>

  <!-- Small flame tip -->
  <path d="M100 186 C116 186 126 178 126 166 C126 155 116 148 108 145"
